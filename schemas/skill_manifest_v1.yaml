$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Snorgnote Skill Manifest v1"
type: object
required:
  - id
  - name
  - version
  - jobs
  - outputs
properties:
  id:
    type: string
    minLength: 1
  name:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  description:
    type: string
  enabled:
    type: boolean
  triggers:
    type: array
    items:
      type: string
  inputs:
    type: object
    properties:
      folders:
        type: array
        items: { type: string }
      tags:
        type: array
        items: { type: string }
      sources:
        type: array
        items: { type: string }
      time_window_days:
        type: integer
        minimum: 1
  jobs:
    type: array
    minItems: 1
    items:
      type: string
  outputs:
    type: array
    minItems: 1
    items:
      oneOf:
        - type: string
        - type: object
          required: [target]
          properties:
            target: { type: string }
            section: { type: string }
  llm_policy:
    type: object
    properties:
      provider: { type: string }
      model: { type: string }
      citation_required: { type: boolean }
  error_policy:
    type: object
    properties:
      max_retries: { type: integer, minimum: 0 }
      fallback: { type: string }
      dead_letter: { type: boolean }
  permissions:
    type: object
    properties:
      read:
        type: array
        items: { type: string }
      write:
        type: array
        items: { type: string }
